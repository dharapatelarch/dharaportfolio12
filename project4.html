
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project 4</title>
<link rel="stylesheet" href="style.css">

<style>

/* gallery layout */
.project-gallery{
  display:flex;
  gap:40px;
  justify-content:center;
  padding:40px;
}

.project-gallery img{
  width:500px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.project-gallery img:hover{
  transform:scale(1.03);
}

/* fullscreen viewer */

.lightbox{
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

.close{
  position:absolute;
  top:30px;
  right:50px;
  font-size:40px;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<header>
  <div class="logo">ARCHITECTURAL PORTFOLIO</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="index.html#about">About</a>
  </nav>
</header>

<section class="project-page">

<h1>Project 1</h1>

<div class="project-gallery">

<img src="PROJECT 01 - 01 (1).png" onclick="openImage(this)">
<img src="PROJECT 01 - 02 (1).png" onclick="openImage(this)">
<img src="PROJECT 01 - 03.png" onclick="openImage(this)">

</div>

</section>


<!-- FULLSCREEN VIEWER -->

<div id="lightbox" class="lightbox">
<span class="close" onclick="closeImage()">&times;</span>
<img id="lightboxImg">
</div>


<script>

function openImage(img){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=img.src;
}

function closeImage(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
